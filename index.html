<!DOCTYPE html>
<html>
<head>
    <title>Tech Store</title>
    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:#222;
            color:white;
            padding:20px;
            text-align:center;
        }

        .products{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin:30px;
        }

        .card{
            background:white;
            width:250px;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .card img{
            width:100%;
            border-radius:10px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        footer{
            text-align:center;
            padding:20px;
            background:#222;
            color:white;
            margin-top:20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Tech Store</h1>
    <p>GitHub Pages Hosted Shopping Website</p>
</header>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500">
        <h3>iPhone</h3>
        <p>₹79,999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500">
        <h3>Shoes</h3>
        <p>₹2,999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500">
        <h3>Headphones</h3>
        <p>₹4,999</p>
        <button>Buy Now</button>
    </div>

</div>

<footer>
    Created by Payal Vaidya | GitHub Actions Demo
</footer>

</body>
</html>
