<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechMart Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#111827;
    color:white;
    padding:15px 40px;
    position:sticky;
    top:0;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.cart{
    background:#2563eb;
    padding:10px 15px;
    border-radius:8px;
}

.hero{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{ font-size:50px; }
.hero p{ margin-top:10px; font-size:20px; }

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:50px;
}

.card{
    background:white;
    width:280px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{ padding:15px; }

.price{
    color:#2563eb;
    font-size:22px;
    font-weight:bold;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

.features{
    background:white;
    padding:30px;
    text-align:center;
}

footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:20px;
}

input{
    padding:10px;
    width:300px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
<nav>
<div class="logo">🛒 TechMart</div>
<div class="cart">Cart: <span id="cartCount">0</span></div>
</nav>
</header>

<section class="hero">
<h1>Big Summer Sale</h1>
<p>Up to 70% Off On Electronics</p>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800">
<div class="content">
<h3>iPhone 16 Pro</h3>
<p class="price">₹89,999</p>
<button onclick="addToCart('iPhone 16 Pro')">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800">
<div class="content">
<h3>Headphones</h3>
<p class="price">₹4,999</p>
<button onclick="addToCart('Headphones')">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800">
<div class="content">
<h3>Nike Shoes</h3>
<p class="price">₹2,999</p>
<button onclick="addToCart('Nike Shoes')">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800">
<div class="content">
<h3>Smart Watch</h3>
<p class="price">₹6,999</p>
<button onclick="addToCart('Smart Watch')">Add To Cart</button>
</div>
</div>

</section>

<section class="features">
<h2>🧾 Checkout (COD)</h2>

<p>Delivery Address:</p>
<input type="text" id="location" placeholder="Enter your full address">

<br><br>

<button onclick="checkout()">Place Order (Cash on Delivery)</button>

<div id="orderSummary" style="margin-top:20px;"></div>
</section>

<footer>
<h3>Created by Payal Vaidya</h3>
<p>CloudOps Engineer | Demo Project</p>
</footer>

<script>
let cart = [];
let cartCount = 0;

const products = {
  "iPhone 16 Pro": 89999,
  "Headphones": 4999,
  "Nike Shoes": 2999,
  "Smart Watch": 6999
};

function addToCart(product){
  cart.push(product);
  cartCount++;

  document.getElementById("cartCount").innerText = cartCount;
  alert(product + " added to cart!");
}

function checkout(){
  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  let location = document.getElementById("location").value;

  if(!location){
    alert("Please enter delivery address!");
    return;
  }

  let subtotal = 0;

  cart.forEach(item => {
    subtotal += products[item];
  });

  let gst = subtotal * 0.18;
  let total = subtotal + gst;

  document.getElementById("orderSummary").innerHTML = `
    <h3>✅ Order Placed Successfully (COD)</h3>
    <p><b>Items:</b> ${cart.join(", ")}</p>
    <p><b>Subtotal:</b> ₹${subtotal.toFixed(2)}</p>
    <p><b>GST (18%):</b> ₹${gst.toFixed(2)}</p>
    <p><b>Total:</b> ₹${total.toFixed(2)}</p>
    <p><b>Address:</b> ${location}</p>
    <p style="color:green;"><b>Payment Mode: Cash on Delivery</b></p>
  `;

  // reset cart
  cart = [];
  cartCount = 0;
  document.getElementById("cartCount").innerText = 0;
}
</script>

</body>
</html>
